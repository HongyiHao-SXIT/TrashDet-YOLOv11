{% extends "base.html" %}
{% block content %}
<h2>登录</h2>
<form method="post" action="{{ url_for('auth.login') }}">
  <label>用户名</label><br>
  <input type="text" name="username" required><br>
  <label>密码</label><br>
  <input type="password" name="password" required><br>
  <button type="submit">登录</button>
</form>
<p>没有账号？ <a href="{{ url_for('auth.register') }}">注册</a></p>
{% endblock %}
