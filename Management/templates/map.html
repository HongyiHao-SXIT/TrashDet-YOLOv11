{% extends "base.html" %}
{% block content %}
<h2>地图展示</h2>
<div id="map" style="height:600px;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const points = {{ points|tojson }};
var map = L.map('map').setView([31.23,121.47], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

points.forEach(p=>{
  if(p.lat && p.lng){
    const marker = L.marker([p.lat, p.lng]).addTo(map);
    const img = p.img ? `<img src="/static/results/${p.img}" width="200">` : "";
    const classes = p.classes ? p.classes.join(", ") : "";
    marker.bindPopup(`<div>${img}<p>${classes}</p><p>${p.time}</p></div>`);
  }
});
</script>
{% endblock %}
