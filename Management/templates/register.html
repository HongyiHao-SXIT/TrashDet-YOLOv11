{% extends "base.html" %}
{% block content %}
<h2>注册</h2>
<form method="post" action="{{ url_for('auth.register') }}">
  <label>用户名</label><br>
  <input type="text" name="username" required><br>
  <label>密码</label><br>
  <input type="password" name="password" required><br>
  <button type="submit">注册</button>
</form>
<p>已有账号？ <a href="{{ url_for('auth.login') }}">登录</a></p>
{% endblock %}
